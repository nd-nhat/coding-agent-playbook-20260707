# TODO: workflow_dispatch only (private repo の課金回避)。public 化時の enable 手順は .github/workflows/README.md 参照
name: shellcheck
on:
  workflow_dispatch:
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on all tracked *.sh
        # git ls-files で全 .sh を網羅 (素の glob は recurse しない)。末尾 -- で先頭 - のファイル名がオプション誤解釈されるのを防ぐ。
        # --severity=warning は SC2016 (info) を除外: sh -lc '$1' 等の意図的な位置パラメータ渡しへの false-positive のため。
        run: git ls-files -z '*.sh' | xargs -0 -r shellcheck --severity=warning --
