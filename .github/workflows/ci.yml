name: ci

on:
  push:
    branches: ["stage/**"]
    paths: ["app/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: ["stage/**"]
    paths: ["app/**", ".github/workflows/ci.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  ci:
    runs-on: ${{ vars.CI_USE_SELF_HOSTED_RUNNER == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
