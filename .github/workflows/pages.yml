# 他の lint 系 workflow と異なり push も有効: 1 run の実行コストが小さく private repo でも課金影響が軽微なため (.github/workflows/README.md 参照)
name: pages
on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/configure-pages@v6
      - name: Upload slides/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: slides
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
