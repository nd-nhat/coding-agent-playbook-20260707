  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/white.css" integrity="sha384-flndleNngtsjA21lEvW9JpgOND8agbgm+1EI+KQFbNa0OcOWGydVQbh+G3H2E1dI" crossorigin="anonymous">
  <style>
    :root {
      --r-main-font: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      --r-heading-font: var(--r-main-font);
      --accent: #1f6feb;
    }
    .reveal { font-family: var(--r-main-font); }
    .reveal h1, .reveal h2, .reveal h3 { font-family: var(--r-heading-font); color: #0d2b4e; text-transform: none; letter-spacing: 0; }
    .reveal h1 { font-size: 2.1em; }
    .reveal h2 { font-size: 1.55em; }
    /* スライドは 1280x720 の枠を canvas とし、中身は上端から流す。枠に収まらないスライドは下の script で等倍縮小して全体を表示する (隠さない) */
    .reveal .slides { text-align: left; }
    .reveal section { height: 100%; top: 0 !important; padding: 40px 88px; box-sizing: border-box; }
    .reveal .fit-wrap { width: 100%; }
    .reveal h2 { margin-top: 0; margin-bottom: .55em; border-bottom: 3px solid var(--accent); padding-bottom: .2em; }
    .reveal ul { margin: 0; }
    .reveal li { margin: .4em 0; line-height: 1.5; }
    .reveal strong { color: var(--accent); }
    /* インラインコードは chip 状にして地の文と視覚的に区別する */
    .reveal code { background: #edf2f9; color: #143d6b; padding: .08em .4em; border-radius: .25em; font-size: .9em; }
    /* mermaid が svg に inline max-width を設定するため、全幅表示に上書きする */
    .reveal .mermaid svg { width: 100%; max-width: none; height: auto; }
    /* タイトル扉 (h1 のみのスライド) は枠の中央に置く */
    .reveal section.title-slide { display: flex !important; flex-direction: column; justify-content: center; }
    .reveal section.title-slide h1, .reveal section.title-slide h2 { border: none; }
    .reveal .subtle { color: #5a6b7b; font-size: .7em; }
  </style>
</head>

## このフェーズでやること

- **自分の設計から地続き**で進む（追いつくなら `git switch stage/03-design`）
- 設計に沿って**動く MVP** を実装（web / api / mock / core / infra）

## PR までの流れ（1 プロンプトで自走）

<div class="mermaid">
flowchart LR
  I["実装<br/>（worktree 内）"] --> P["commit / push<br/>→ PR 作成"]
  subgraph G["/pr-codex-ci が merge-ready まで自走"]
    CX["codex review + CI 確認<br/>（local gate）"]
    BR["PR の bot review 対応<br/>（remote gate）"]
    CX --> BR
    BR -- "修正 push したら再評価" --> CX
  end
  P --> CX
  BR --> RPT["merge-ready 報告<br/>（agent は停止）"]
  RPT --> M["merge 判断<br/>（人間）"]
</div>

<span class="subtle">実装中の codex 相談（`/a2a-review`）は任意の second opinion。PR 後の codex review は gate として必ず回る。自走中の人間は **HOTL 監視**（statusLine の session id → host から transcript）</span>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js" integrity="sha384-rZIIVPQD/+U9IL3I62KrBHuVtPgYv+xdXvER5RBiVQRszJEJfLKRrcrZwI7fhcHT" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/markdown/markdown.js" integrity="sha384-ee/QmFMUwC+YUuswSDzliKj27Anp3rSblE1ujBcPKyrzwG15Daa1GL6JcNbPg/oG" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.16.0/dist/mermaid.min.js" integrity="sha384-T/0lMUdJpd2S1ZHtRiofG3htU3xPCrFVeAQ1UUE2TJwlEJSV5NUwn30kP28n238E" crossorigin="anonymous"></script>
  <script>
    Reveal.initialize({
      hash: true,
      center: false,
      width: 1280,
      height: 720,
      margin: 0,
      slideNumber: "c/t",
      plugins: [ RevealMarkdown ],
    }).then(() => {
      // 枠 (720px) に収まらないスライドは中身を等倍縮小して全体を表示する (隠さない)
      const fit = () => {
        const sec = Reveal.getCurrentSlide();
        if (!sec) return;
        let wrap = sec.querySelector(":scope > .fit-wrap");
        if (!wrap) {
          wrap = document.createElement("div");
          wrap.className = "fit-wrap";
          while (sec.firstChild) wrap.appendChild(sec.firstChild);
          sec.appendChild(wrap);
        }
        wrap.style.transform = "none";
        wrap.style.width = "100%";
        const cs = getComputedStyle(sec);
        const avail = 720 - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
        wrap.style.transformOrigin = "top left";
        // 縮小時は倍率ぶん wrap を広げて縮小後に全幅へ戻す (縮小だけだと 100% 幅で折り返した行が縮み右側が空く)。幅を変えると折り返しで高さも変わるため二分探索で倍率を確定する
        const fits = (s) => { wrap.style.width = (100 / s) + "%"; return wrap.scrollHeight * s <= avail + 0.5; };
        let scale = 1;
        if (!fits(1)) {
          // 100% 幅時の縮小率を下限に取る (幅を広げると高さは増えないため必ず収まる保証付き = 収まらないまま探索が終わる床を持たない)
          let lo = avail / wrap.scrollHeight, hi = 1;
          for (let i = 0; i < 8; i++) { const mid = (lo + hi) / 2; if (fits(mid)) lo = mid; else hi = mid; }
          scale = lo;
          fits(scale);
        }
        wrap.style.transform = scale < 1 ? "scale(" + scale + ")" : "none";
      };
      fit();
      Reveal.on("slidechanged", fit);
      window.addEventListener("resize", fit);
      // mermaid の <script> を読み込んだデッキだけ図を描画する (レイアウトが変わるので描画後に fit を再計算)
      if (window.mermaid) {
        mermaid.initialize({ startOnLoad: false, theme: "neutral", flowchart: { htmlLabels: false } });
        mermaid.run().catch((e) => console.error("mermaid render failed", e)).then(fit);
      }
    });
  </script>
