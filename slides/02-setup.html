  <style>
    :root {
      --r-main-font: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      --r-heading-font: var(--r-main-font);
      --accent: #1f6feb;
    }
    .reveal { font-family: var(--r-main-font); }
    .reveal h1, .reveal h2, .reveal h3 { font-family: var(--r-heading-font); color: #0d2b4e; text-transform: none; letter-spacing: 0; }
    .reveal h1 { font-size: 2.1em; }
    .reveal h2 { font-size: 1.55em; }
    /* スライドは 1280x720 の枠を canvas とし、中身は上端から流す。枠に収まらないスライドは下の script で等倍縮小して全体を表示する (隠さない) */
    .reveal .slides { text-align: left; }
    .reveal section { height: 100%; top: 0 !important; padding: 40px 88px; box-sizing: border-box; }
    .reveal .fit-wrap { width: 100%; }
    .reveal h2 { margin-top: 0; margin-bottom: .55em; border-bottom: 3px solid var(--accent); padding-bottom: .2em; }
    .reveal ul { margin: 0; }
    .reveal li { margin: .4em 0; line-height: 1.5; }
    .reveal strong { color: var(--accent); }
    /* インラインコードは chip 状にして地の文と視覚的に区別する */
    .reveal code { background: #edf2f9; color: #143d6b; padding: .08em .4em; border-radius: .25em; font-size: .9em; }
    /* mermaid が svg に inline max-width を設定するため、全幅表示に上書きする */
    .reveal .mermaid svg { width: 100%; max-width: none; height: auto; }
    /* タイトル扉 (h1 のみのスライド) は枠の中央に置く */
    .reveal section.title-slide { display: flex !important; flex-direction: column; justify-content: center; }
    .reveal section.title-slide h1, .reveal section.title-slide h2 { border: none; }
    .reveal .subtle { color: #5a6b7b; font-size: .7em; }
  </style>

# 環境構築

---

## STEP 1: repo を用意

- **fork** して clone（**git 2.48+**）
- 設定は repo 同梱 — **clone するだけで揃う**

<span class="subtle">2.48+ は box 内 worktree（`--relative-paths`）に必須。fork 時は "Copy the `main` branch only" を**外す** — 講義は `stage/*` ブランチを使う</span>

---

## STEP 2: Docker Sandboxes を入れて `sbx login`

- [Docker Sandboxes](https://docs.docker.com/ai/sandboxes/) を install（`sbx` CLI。v0.34.0+ 推奨）
- `sbx login` で Docker アカウント認証

---

## STEP 3: `sbx secret set -g github`

PR 操作用の **fine-grained PAT**（**対象 repo に限定**して発行）をプロンプトに貼る。ON にする権限:

| 権限 | アクセス | 用途 |
|------|---------|------|
| Contents | Read/Write | `git push` |
| Pull requests | Read/Write | `gh pr create` / merge |
| Issues | Read/Write | `gh issue create` |
| Actions | Read | `gh pr checks`（CI） |
| Commit statuses | Read | `gh pr checks`（status） |

<span class="subtle">Metadata: Read は自動付与。**secret は box 作成時にのみ反映** → 次の box 起動より前に登録。理由・発行手順は `docs/guide/setup.md`</span>

---

## STEP 4: `sbx secret set -g openai --oauth`

- browser で **ChatGPT 認証**（サブスク経路推奨）
- codex の second opinion（`/a2a-review` / `/pr-codex-ci`）が使う

<span class="subtle">これも box 作成前に。**サブスク経路**なら github / openai の 2 種だけ（API 課金は anthropic も必要 → STEP 6）</span>

---

## STEP 5: `bash scripts/dev.sh`

- dev box が立ち、その中で claude が起動する
- 初回は image を**自動 build**（約 5 分・以降は数秒）。作り直し・更新は `bash scripts/build-image.sh`
- codex reviewer（`cdx-<NAME>` pair）も自動で立つ — 手動セットアップ不要

<span class="subtle">Windows は `powershell -ExecutionPolicy Bypass -File scripts/dev.ps1`</span>

---

## STEP 6: 箱の中で `/login`（Claude 認証）

- サブスク（Pro/Max）なら **secret 登録は不要** — 最初の box で `/login` するだけ（v0.34.0）
- 以降の box は自動 provision
- API 課金なら `/login` の代わりに API key を `sbx secret set -g anthropic`（host secret なので **STEP 5 の前**に登録 — 後からだと box 再作成が要る）

<span class="subtle">`setup-token` を登録すると `claude -p` が壊れる（`docs/guide/setup.md`）</span>

---

## 詰まったら: `bash scripts/check-setup.sh`

- 環境 doctor — **前提ツール（git / sbx / Docker）/ secret / image** をまとめて点検
- 各チェックが対処法を出すので、該当 STEP をやり直す

---

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js" integrity="sha384-rZIIVPQD/+U9IL3I62KrBHuVtPgYv+xdXvER5RBiVQRszJEJfLKRrcrZwI7fhcHT" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/plugin/markdown/markdown.js" integrity="sha384-ee/QmFMUwC+YUuswSDzliKj27Anp3rSblE1ujBcPKyrzwG15Daa1GL6JcNbPg/oG" crossorigin="anonymous"></script>
  <script>
    // mermaid の auto-start (startOnLoad 既定 true) は window load で走り、reveal の slide 非表示化と
    // race して図が空 viewBox に潰れるため、読み込み直後に無効化する (描画は下の ready 後ブロック)
    if (window.mermaid) mermaid.initialize({ startOnLoad: false, theme: "neutral", flowchart: { htmlLabels: false } });
    Reveal.initialize({
      hash: true,
      center: false,
      width: 1280,
      height: 720,
      margin: 0,
      slideNumber: "c/t",
      plugins: [ RevealMarkdown ],
    }).then(() => {
      // 枠 (720px) に収まらないスライドは中身を等倍縮小して全体を表示する (隠さない)
      const fit = () => {
        const sec = Reveal.getCurrentSlide();
        if (!sec) return;
        let wrap = sec.querySelector(":scope > .fit-wrap");
        if (!wrap) {
          wrap = document.createElement("div");
          wrap.className = "fit-wrap";
          while (sec.firstChild) wrap.appendChild(sec.firstChild);
          sec.appendChild(wrap);
        }
        wrap.style.transform = "none";
        wrap.style.width = "100%";
        const cs = getComputedStyle(sec);
        const avail = 720 - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
        wrap.style.transformOrigin = "top left";
        // 縮小時は倍率ぶん wrap を広げて縮小後に全幅へ戻す (縮小だけだと 100% 幅で折り返した行が縮み右側が空く)。幅を変えると折り返しで高さも変わるため二分探索で倍率を確定する
        const fits = (s) => { wrap.style.width = (100 / s) + "%"; return wrap.scrollHeight * s <= avail + 0.5; };
        let scale = 1;
        if (!fits(1)) {
          // 100% 幅時の縮小率を下限に取る (幅を広げると高さは増えないため必ず収まる保証付き = 収まらないまま探索が終わる床を持たない)
          let lo = avail / wrap.scrollHeight, hi = 1;
          for (let i = 0; i < 8; i++) { const mid = (lo + hi) / 2; if (fits(mid)) lo = mid; else hi = mid; }
          scale = lo;
          fits(scale);
        }
        wrap.style.transform = scale < 1 ? "scale(" + scale + ")" : "none";
      };
      fit();
      Reveal.on("slidechanged", fit);
      window.addEventListener("resize", fit);
      // mermaid の <script> を読み込んだデッキだけ図を描画する (レイアウトが変わるので描画後に fit を再計算)
      if (window.mermaid) {
        // 非表示 slide 上で描画するとテキスト幅が 0 に測られ空 viewBox (幅 16px) に潰れるため、
        // offscreen の可視コンテナで描画する。万一潰れた図は source から再描画してヒーリングする
        const graphs = Array.from(document.querySelectorAll(".mermaid"));
        graphs.forEach((g) => { g.__mermaidSrc = g.textContent; });
        const collapsed = (g) => { const svg = g.querySelector("svg"); return !svg || svg.viewBox.baseVal.width < 32; };
        const renderPass = async (targets) => {
          const pen = document.createElement("div");
          pen.style.cssText = "position:absolute;left:-10000px;top:0;width:1280px;visibility:hidden;";
          document.body.appendChild(pen);
          const slots = targets.map((g) => { const m = document.createComment("mermaid-slot"); g.parentNode.insertBefore(m, g); pen.appendChild(g); return m; });
          try { await mermaid.run({ nodes: targets }); }
          finally { targets.forEach((g, i) => { slots[i].parentNode.insertBefore(g, slots[i]); slots[i].remove(); }); pen.remove(); }
        };
        (async () => {
          try {
            if (graphs.length) await renderPass(graphs);
            for (let retry = 0; retry < 3; retry++) {
              const bad = graphs.filter(collapsed);
              if (!bad.length) break;
              await document.fonts.ready;
              await new Promise((r) => setTimeout(r, 150 * (retry + 1)));
              bad.forEach((g) => { g.removeAttribute("data-processed"); g.textContent = g.__mermaidSrc; });
              await renderPass(bad);
            }
          } catch (e) { console.error("mermaid render failed", e); }
          fit();
        })();
      }
    });
  </script>
